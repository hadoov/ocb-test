<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mock Test</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section id="start-screen" class="screen start-screen" aria-labelledby="start-title">
        <div class="brand-row">
          <span class="mark" aria-hidden="true">AU</span>
          <span>Practice test</span>
        </div>
        <h1 id="start-title">Mock Test</h1>
        <p>
          Answer 20 randomly selected questions. You need at least 75% overall and every
          Australian values question correct to pass.
        </p>
        <button id="start-button" class="primary-button" type="button">Start test</button>
        <p id="start-error" class="warning hidden" role="alert"></p>
      </section>

      <section id="test-screen" class="screen hidden" aria-labelledby="test-title">
        <header class="test-header">
          <div>
            <div class="brand-row compact">
              <span class="mark" aria-hidden="true">AU</span>
              <span>Mock test</span>
            </div>
            <h1 id="test-title">Citizenship questions</h1>
          </div>
          <div class="progress-pill">
            <span id="answered-count">0</span>/20 answered
          </div>
        </header>

        <form id="test-form" class="question-list"></form>

        <div class="question-nav">
          <button id="previous-button" class="secondary-button" type="button">Previous</button>
          <p id="submit-warning" class="warning hidden" role="alert">Please answer every question before submitting.</p>
          <button id="next-button" class="primary-button" type="button">Next</button>
          <button id="submit-button" class="primary-button" type="button">Submit answers</button>
        </div>
      </section>

      <section id="results-screen" class="screen hidden" aria-labelledby="results-title">
        <div id="result-banner" class="result-banner"></div>
        <h1 id="results-title">Your result</h1>
        <div id="score-summary" class="score-summary"></div>
        <div id="part-results" class="part-results"></div>
        <div id="review-list" class="review-list"></div>
        <button id="restart-button" class="primary-button" type="button">Start a new test</button>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
